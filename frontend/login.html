<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALVA — Sign In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Back link -->
  <a href="index.html" class="auth-back">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </a>

  <!-- ===================== AUTH PAGE ===================== -->
  <div class="auth-page">

    <!-- Left panel: hero image -->
    <div class="hero-split">
      <div class="hero-bg" style="background-image: url('/storage/storage/auth-hero.png');"></div>
      <div class="hero-overlay"></div>
      <div class="hero-split-content">
        <span class="hero-split-logo">ALVA</span>
        <span class="hero-split-tagline">Redefining Modern Elegance</span>
      </div>
    </div>

    <!-- Right panel: form -->
    <div class="auth-panel">
      <div class="auth-panel-inner">

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-signin">Sign In</button>
          <button class="auth-tab" id="tab-signup">Sign Up</button>
        </div>

        <!-- ---- SIGN IN FORM ---- -->
        <form class="auth-form active" id="form-signin" novalidate>
          <div id="error-signin" class="form-error"></div>

          <div class="form-group">
            <label class="form-label" for="signin-email">Email Address</label>
            <input
              type="email"
              id="signin-email"
              class="form-input"
              placeholder="you@example.com"
              autocomplete="email"
              required
            >
          </div>

          <div class="form-group">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
              <label class="form-label" for="signin-password" style="margin-bottom:0;">Password</label>
              <a href="#" class="form-link" id="forgot-link" style="font-size:0.75rem;">Forgot?</a>
            </div>
            <div class="form-input-wrap">
              <input
                type="password"
                id="signin-password"
                class="form-input"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              >
              <button type="button" class="form-input-toggle" data-target="signin-password" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 0;">
            <button type="submit" class="btn btn-full">Continue</button>
          </div>
        </form>

        <!-- ---- SIGN UP FORM ---- -->
        <form class="auth-form" id="form-signup" novalidate>
          <div id="error-signup" class="form-error"></div>

          <div class="form-group">
            <label class="form-label" for="signup-name">Full Name</label>
            <input
              type="text"
              id="signup-name"
              class="form-input"
              placeholder="Your full name"
              autocomplete="name"
              required
            >
          </div>

          <div class="form-group">
            <label class="form-label" for="signup-email">Email Address</label>
            <input
              type="email"
              id="signup-email"
              class="form-input"
              placeholder="you@example.com"
              autocomplete="email"
              required
            >
          </div>

          <div class="form-group">
            <label class="form-label" for="signup-password">Password</label>
            <div class="form-input-wrap">
              <input
                type="password"
                id="signup-password"
                class="form-input"
                placeholder="At least 8 characters"
                autocomplete="new-password"
                required
              >
              <button type="button" class="form-input-toggle" data-target="signup-password" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="signup-confirm">Confirm Password</label>
            <div class="form-input-wrap">
              <input
                type="password"
                id="signup-confirm"
                class="form-input"
                placeholder="Repeat your password"
                autocomplete="new-password"
                required
              >
              <button type="button" class="form-input-toggle" data-target="signup-confirm" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 0;">
            <button type="submit" class="btn btn-full">Create Account</button>
          </div>
        </form>

        <!-- Footer note -->
        <div class="auth-footer">
          By continuing you agree to ALVA's
          <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
        </div>

      </div>
    </div>

  </div>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
