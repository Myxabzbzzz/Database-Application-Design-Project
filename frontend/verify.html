<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALVA — Verify Email</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .otp-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 8px 0;
    }

    .otp-input {
      width: 48px;
      height: 56px;
      text-align: center;
      font-size: 1.4rem;
      font-family: var(--font-sans);
      font-weight: 500;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      outline: none;
      caret-color: var(--gold);
      transition: border-color var(--transition-fast);
    }

    .otp-input:focus {
      border-color: var(--gold);
    }

    .otp-input.filled {
      border-color: var(--border-light);
    }

    .verify-title {
      font-family: var(--font-serif);
      font-size: 1.6rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 8px;
    }

    .verify-subtitle {
      font-size: 0.85rem;
      color: var(--text-2);
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .verify-subtitle span {
      color: var(--text);
    }

    .resend-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--text-2);
    }

    .resend-btn {
      background: none;
      border: none;
      color: var(--gold);
      font-size: 0.8rem;
      font-family: var(--font-sans);
      cursor: pointer;
      padding: 0;
      transition: color var(--transition-fast);
    }

    .resend-btn:hover:not(:disabled) {
      color: var(--gold-light);
    }

    .resend-btn:disabled {
      color: var(--text-3);
      cursor: default;
    }

    .resend-timer {
      color: var(--text-3);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <a href="login.html" class="auth-back">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </a>

  <div class="auth-page">

    <!-- Left panel -->
    <div class="hero-split">
      <div class="hero-bg" style="background-image: url('/storage/storage/auth-hero.png');"></div>
      <div class="hero-overlay"></div>
      <div class="hero-split-content">
        <span class="hero-split-logo">ALVA</span>
        <span class="hero-split-tagline">Redefining Modern Elegance</span>
      </div>
    </div>

    <!-- Right panel -->
    <div class="auth-panel">
      <div class="auth-panel-inner">

        <p class="verify-title">Check your inbox</p>
        <p class="verify-subtitle">
          We sent a 6-digit code to <span id="email-display">your email</span>.<br>
          Enter it below to verify your account.
        </p>

        <div id="error-verify" class="form-error"></div>

        <form id="form-verify" novalidate>
          <div class="form-group">
            <div class="otp-group" id="otp-group">
              <input class="otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
              <input class="otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
              <input class="otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
              <input class="otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
              <input class="otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
              <input class="otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 0;">
            <button type="submit" class="btn btn-full" id="btn-verify" data-label="Verify Email">Verify Email</button>
          </div>
        </form>

        <div class="resend-row">
          <span>Didn't receive it?</span>
          <button class="resend-btn" id="resend-btn">Resend code</button>
          <span class="resend-timer" id="resend-timer"></span>
        </div>

      </div>
    </div>

  </div>

  <script src="js/verify.js"></script>
</body>
</html>
