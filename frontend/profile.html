<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALVA — My Account</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .profile-page {
      min-height: 100vh;
      padding: calc(var(--nav-height) + var(--space-3xl)) var(--space-xl) var(--space-3xl);
      max-width: 720px;
      margin: 0 auto;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: var(--space-xl);
      padding-bottom: var(--space-2xl);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--space-2xl);
    }

    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .profile-avatar svg {
      width: 32px;
      height: 32px;
      stroke: var(--text-3);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .profile-name {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 4px;
    }

    .profile-email {
      font-size: 0.85rem;
      color: var(--text-3);
    }

    .profile-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid var(--border-light);
      color: var(--text-2);
    }

    .profile-badge.verified {
      border-color: var(--gold);
      color: var(--gold);
    }

    .profile-section {
      margin-bottom: var(--space-2xl);
    }

    .profile-section-title {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: var(--space-lg);
    }

    .profile-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-md) 0;
      border-bottom: 1px solid var(--border);
    }

    .profile-row:last-child {
      border-bottom: none;
    }

    .profile-row-label {
      font-size: 0.8rem;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .profile-row-value {
      font-size: 0.9rem;
      color: var(--text);
    }

    .profile-loading {
      text-align: center;
      padding: var(--space-3xl) 0;
      color: var(--text-3);
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }

    .profile-error {
      text-align: center;
      padding: var(--space-3xl) 0;
      color: var(--text-3);
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="main-nav">
    <a href="index.html" class="nav-logo">ALVA</a>
    <div class="nav-links">
      <a href="collection.html">Collections</a>
      <a href="designers.html">Designers</a>
      <a href="index.html#about">About</a>
    </div>
    <div class="nav-icons">
      <button class="nav-icon-btn" aria-label="Search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <a href="profile.html" class="nav-icon-btn" aria-label="Account">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </a>
      <a href="cart.html" class="nav-icon-btn" aria-label="Cart">
        <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-count"></span>
      </a>
    </div>
  </nav>

  <main class="profile-page">

    <div id="profile-loading" class="profile-loading">Loading…</div>

    <div id="profile-content" style="display:none;">

      <div class="profile-header">
        <div class="profile-avatar">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div>
          <div class="profile-name" id="profile-name">—</div>
          <div class="profile-email" id="profile-email">—</div>
          <div class="profile-badge verified" id="profile-verified-badge" style="display:none;">Verified</div>
          <button class="profile-badge" id="profile-unverified-badge" style="display:none;cursor:pointer;font-family:var(--font-sans);">
            Email not verified — Resend code
          </button>
        </div>
      </div>

      <div class="profile-section">
        <div class="profile-section-title">Account details</div>
        <div class="profile-row">
          <span class="profile-row-label">Name</span>
          <span class="profile-row-value" id="detail-name">—</span>
        </div>
        <div class="profile-row">
          <span class="profile-row-label">Email</span>
          <span class="profile-row-value" id="detail-email">—</span>
        </div>
        <div class="profile-row">
          <span class="profile-row-label">Role</span>
          <span class="profile-row-value" id="detail-role">—</span>
        </div>
        <div class="profile-row">
          <span class="profile-row-label">Member since</span>
          <span class="profile-row-value" id="detail-since">—</span>
        </div>
      </div>

      <div class="profile-section">
        <div class="profile-section-title">Actions</div>
        <div style="display:flex;flex-direction:column;gap:var(--space-md);">
          <a href="collection.html" class="btn btn-outline">Browse Collection</a>
          <button class="btn btn-ghost" id="btn-logout" style="border:1px solid var(--border);">Sign Out</button>
        </div>
      </div>

    </div>

    <div id="profile-error" class="profile-error" style="display:none;">
      <p style="font-family:var(--font-serif);font-size:1.4rem;margin-bottom:var(--space-md);">Something went wrong</p>
      <p style="color:var(--text-3);margin-bottom:var(--space-xl);font-size:0.85rem;">Unable to load your profile.</p>
      <a href="login.html" class="btn">Back to Sign In</a>
    </div>

  </main>

  <script src="js/main.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
