upstream service_auth {
    server service-auth:8000;
}

upstream service_payment {
    server service-payment:8000;
}

upstream service_product {
    server service-product:8000;
}

upstream minio {
    server minio:9000;
}

server {
    listen 80;

    # Strip any CORS headers the backend adds so we never get duplicates
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Expose-Headers;

    # Single source of CORS — Nginx owns it
    add_header Access-Control-Allow-Origin  *  always;
    add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept' always;

    # Preflight requests
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── Auth ──────────────────────────────────────────────────────────────────
    location /api/auth/ {
        rewrite ^/api/auth/(.*)$ /api/$1 break;
        proxy_pass         http://service_auth;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # ── Auth Swagger UI + assets ───────────────────────────────────────────────
    location /api/auth/documentation {
        rewrite ^ /api/documentation break;
        proxy_pass         http://service_auth;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    location /api/auth/docs/ {
        proxy_pass         http://service_auth;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    location /vendor/swagger-api/ {
        proxy_pass         http://service_auth;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # ── Products ──────────────────────────────────────────────────────────────
    location /api/products/ {
        rewrite ^/api/products/(.*)$ /api/$1 break;
        proxy_pass         http://service_product;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # ── Payments ──────────────────────────────────────────────────────────────
    location /api/payments/ {
        rewrite ^/api/payments/(.*)$ /api/$1 break;
        proxy_pass         http://service_payment;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # ── Storage (MinIO public read) ───────────────────────────────────────────
    location /storage/ {
        proxy_pass         http://minio/;
        proxy_set_header   Host              minio:9000;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_hide_header  X-Amz-Request-Id;
        proxy_hide_header  X-Amz-Id-2;
    }
}
