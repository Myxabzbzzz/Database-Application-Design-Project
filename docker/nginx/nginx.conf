server {
    listen 80;

    # Docker's embedded DNS — re-resolve upstreams every 30s so nginx
    # picks up new container IPs after restarts without itself restarting.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Strip any CORS headers the backend adds so we never get duplicates
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Expose-Headers;

    # Single source of CORS — Nginx owns it
    add_header Access-Control-Allow-Origin  *  always;
    add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept' always;

    # Preflight requests
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── Auth ──────────────────────────────────────────────────────────────────
    location /api/auth/ {
        set $upstream_auth service-auth:8000;
        rewrite ^/api/auth/(.*)$ /api/$1 break;
        proxy_pass         http://$upstream_auth;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # ── Auth Swagger UI + assets ───────────────────────────────────────────────
    location /api/auth/documentation {
        set $upstream_auth service-auth:8000;
        rewrite ^ /api/documentation break;
        proxy_pass         http://$upstream_auth;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    location /api/auth/docs/ {
        set $upstream_auth service-auth:8000;
        proxy_pass         http://$upstream_auth;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    location /vendor/swagger-api/ {
        set $upstream_auth service-auth:8000;
        proxy_pass         http://$upstream_auth;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # ── Products ──────────────────────────────────────────────────────────────
    location /api/products/ {
        set $upstream_product service-product:8000;
        rewrite ^/api/products/(.*)$ /api/$1 break;
        proxy_pass         http://$upstream_product;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # ── Payments ──────────────────────────────────────────────────────────────
    location /api/payments/ {
        set $upstream_payment service-payment:8000;
        rewrite ^/api/payments/(.*)$ /api/$1 break;
        proxy_pass         http://$upstream_payment;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # ── Storage upload API ────────────────────────────────────────────────────
    location /api/storage/ {
        set $upstream_storage service-storage:8000;
        rewrite ^/api/storage/(.*)$ /api/$1 break;
        proxy_pass         http://$upstream_storage;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        client_max_body_size 50m;
    }

    # ── Storage (MinIO public read) ───────────────────────────────────────────
    location /storage/ {
        set $upstream_minio minio:9000;
        rewrite ^/storage/(.*)$ /$1 break;
        proxy_pass         http://$upstream_minio;
        proxy_set_header   Host              minio:9000;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_hide_header  X-Amz-Request-Id;
        proxy_hide_header  X-Amz-Id-2;
        add_header         Access-Control-Allow-Origin * always;
        add_header         Access-Control-Allow-Methods 'GET, OPTIONS' always;
    }
}
