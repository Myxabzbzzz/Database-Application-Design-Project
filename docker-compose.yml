services:

  # ─── Database ───────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    build: ./docker/minio
    restart: on-failure
    volumes:
      - "./DAD project.fig:/fig/design.fig:ro"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-storage}
    depends_on:
      minio:
        condition: service_healthy

  # ─── Backend services ────────────────────────────────────────────────────────

  service-auth:
    build: ./backend/service-auth
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      APP_NAME: service-auth
      APP_ENV: local
      APP_KEY: ${AUTH_APP_KEY}
      APP_DEBUG: "true"
      APP_URL: http://localhost
      L5_SWAGGER_BASE_PATH: /api/auth
      L5_SWAGGER_UI_DOC_EXPANSION: none
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: auth_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: array
      QUEUE_CONNECTION: redis
      LOG_CHANNEL: stderr
      MAIL_MAILER: smtp
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: amir.boltabayev@gmail.com
      MAIL_PASSWORD: ${GMAIL_APP_PASSWORD}
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: amir.boltabayev@gmail.com
      MAIL_FROM_NAME: "DAD Auth"
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(stream_socket_client('tcp://127.0.0.1:8000')===false?1:0);\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  service-payment:
    build: ./backend/service-payment
    restart: unless-stopped
    ports:
      - "8003:8000"
    environment:
      APP_NAME: service-payment
      APP_ENV: local
      APP_KEY: ${PAYMENT_APP_KEY}
      APP_DEBUG: "true"
      APP_URL: http://localhost:8003
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: payment_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: predis
      CACHE_STORE: redis
      SESSION_DRIVER: array
      QUEUE_CONNECTION: redis
      LOG_CHANNEL: stderr
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(stream_socket_client('tcp://127.0.0.1:8000')===false?1:0);\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  service-product:
    build: ./backend/service-product
    restart: unless-stopped
    ports:
      - "8004:8000"
    environment:
      APP_NAME: service-product
      APP_ENV: local
      APP_KEY: ${PRODUCT_APP_KEY}
      APP_DEBUG: "true"
      APP_URL: http://localhost:8004
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: product_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: predis
      CACHE_STORE: redis
      SESSION_DRIVER: array
      QUEUE_CONNECTION: redis
      LOG_CHANNEL: stderr
      JWT_SECRET: ${JWT_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(stream_socket_client('tcp://127.0.0.1:8000')===false?1:0);\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  service-storage:
    build: ./backend/service-storage
    restart: unless-stopped
    ports:
      - "8005:8000"
    environment:
      APP_NAME: service-storage
      APP_ENV: local
      APP_KEY: ${STORAGE_APP_KEY}
      APP_DEBUG: "true"
      APP_URL: http://localhost
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: ${MINIO_BUCKET:-storage}
      AWS_ENDPOINT: http://minio:9000
      AWS_URL: http://localhost/storage
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      SESSION_DRIVER: array
      CACHE_STORE: array
      LOG_CHANNEL: stderr
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(stream_socket_client('tcp://127.0.0.1:8000')===false?1:0);\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ─── API Gateway ─────────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      service-auth:
        condition: service_healthy
      service-payment:
        condition: service_healthy
      service-product:
        condition: service_healthy
      service-storage:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
