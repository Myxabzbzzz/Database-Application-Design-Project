services:

  # ─── Database ───────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Backend services ────────────────────────────────────────────────────────

  service-auth:
    build: ./backend/service-auth
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      APP_NAME: service-auth
      APP_ENV: local
      APP_KEY: ${AUTH_APP_KEY}
      APP_DEBUG: "true"
      APP_URL: http://localhost
      L5_SWAGGER_BASE_PATH: /api/auth
      L5_SWAGGER_UI_DOC_EXPANSION: none
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: auth_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: array
      QUEUE_CONNECTION: redis
      LOG_CHANNEL: stderr
      MAIL_MAILER: smtp
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: amir.boltabayev@gmail.com
      MAIL_PASSWORD: ${GMAIL_APP_PASSWORD}
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: amir.boltabayev@gmail.com
      MAIL_FROM_NAME: "DAD Auth"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  service-order:
    build: ./backend/service-order
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      APP_NAME: service-order
      APP_ENV: local
      APP_KEY: ${ORDER_APP_KEY}
      APP_DEBUG: "true"
      APP_URL: http://localhost:8002
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: order_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      LOG_CHANNEL: stderr
    depends_on:
      postgres:
        condition: service_healthy

  service-payment:
    build: ./backend/service-payment
    restart: unless-stopped
    ports:
      - "8003:8000"
    environment:
      APP_NAME: service-payment
      APP_ENV: local
      APP_KEY: ${PAYMENT_APP_KEY}
      APP_DEBUG: "true"
      APP_URL: http://localhost:8003
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: payment_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: predis
      CACHE_STORE: redis
      SESSION_DRIVER: array
      QUEUE_CONNECTION: redis
      LOG_CHANNEL: stderr
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  service-product:
    build: ./backend/service-product
    restart: unless-stopped
    ports:
      - "8004:8000"
    environment:
      APP_NAME: service-product
      APP_ENV: local
      APP_KEY: ${PRODUCT_APP_KEY}
      APP_DEBUG: "true"
      APP_URL: http://localhost:8004
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: product_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: predis
      CACHE_STORE: redis
      SESSION_DRIVER: array
      QUEUE_CONNECTION: redis
      LOG_CHANNEL: stderr
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── API Gateway ─────────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - service-auth
      - service-payment
      - service-product

  # ─── Frontend ────────────────────────────────────────────────────────────────

  web-app:
    build: ./frontend/web-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api

volumes:
  postgres_data:
  redis_data:
